<div class="container">
  <h1>Plan your day!</h1>
  <h2>User: <span class="info">{{ user }}</span>. Count of tasks: <span class="info">{{ tasks.length }}</span></h2>
  <hr>
  <div class="form">
    <input type="text" [(ngModel)]="taskName">
    <button [disabled]="!taskName" (click)="addTask()">Add</button>
  </div>
  <app-task-table></app-task-table>
</div>
