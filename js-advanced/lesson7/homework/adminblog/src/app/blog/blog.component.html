<div class="container">
    <div class="post" *ngFor="let post of posts">
        <img src="../../assets/nature.jpeg" alt="{{ post.title }}">
        <div>
            <span>{{ post.author }}</span>
            <h2>{{ post.title }}</h2>
            <p>{{ post.text | slice:0:post.text.indexOf(' ', 500) }} <span *ngIf="post.text.length &gt; 500">...</span></p>
        </div>
    </div>
</div>
