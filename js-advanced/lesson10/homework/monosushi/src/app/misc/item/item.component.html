<div class="item" *ngIf="item">
  <a
    [routerLink]="['/products/', item.product, '/', item.path].join('')"
    class="item-link"
  >
    <img
      [src]="ui.firebase(item.logo)"
      [alt]="item.path"
      class="item-link-img"
    />
  </a>
  <a
    [routerLink]="['/products/', item.product, '/', item.path].join('')"
    class="item-h4"
  >
    {{ item.name }}
  </a>
  <div class="item-details">
    <span class="item-details-comp">{{ item.comp }}</span>
    <b class="item-details-weight">{{ item.weight }}</b>
  </div>
  <div class="item-order">
    <span class="item-order-price"
      ><b>{{ ui.parseInt(item.price) * qty }}</b> грн</span
    >
    <app-numeric
      #numeric
      [value]="qty"
      (changeEvent)="changeQty($event)"
    ></app-numeric>
    <button class="item-order-button">Замовити</button>
  </div>
</div>
